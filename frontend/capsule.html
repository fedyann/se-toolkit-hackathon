<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blobbi — Time Capsule ˚✧</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #FDFAF5; --color-surface: #FFFFFF; --color-primary: #4361EE;
            --color-secondary: #C8F542; --color-pink: #FF6B9D; --color-yellow: #FFD166;
            --color-sky: #A8DAFF; --color-text: #1A1A2E; --color-muted: #6B7A99;
            --color-border: #E8E4F0; --font-display: 'Syne', sans-serif;
            --font-body: 'Nunito', sans-serif; --font-mono: 'Space Mono', monospace;
            --radius-card: 20px; --radius-pill: 100px;
            --shadow-card: 0 4px 24px rgba(67, 97, 238, 0.08);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body); background: var(--color-bg); color: var(--color-text);
            line-height: 1.7; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1;
            background-image: radial-gradient(circle, var(--color-border) 1.2px, transparent 1.2px);
            background-size: 20px 20px;
        }

        /* Navbar */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 48px;
            background: rgba(253, 250, 245, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transition: box-shadow 0.3s ease;
        }
        .navbar.scrolled { box-shadow: 0 1px 0 var(--color-border); }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            font-family: var(--font-display); font-weight: 800; font-size: 26px;
            color: var(--color-text); text-decoration: none;
        }
        .navbar-brand .blob-icon { width: 32px; height: 32px; }
        .nav-links { display: flex; align-items: center; gap: 32px; }
        .nav-links a {
            font-family: var(--font-body); font-size: 15px; font-weight: 600;
            color: var(--color-muted); text-decoration: none; position: relative; transition: color 0.25s ease;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--color-text); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 2.5px; background: var(--color-primary);
            border-radius: 2px; transition: width 0.3s ease;
        }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-toggle { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
        .nav-toggle span { display: block; width: 24px; height: 2.5px; background: var(--color-text); border-radius: 2px; }

        /* Page */
        .capsule-page { padding: 120px 48px 80px; max-width: 700px; margin: 0 auto; }

        .capsule-header { text-align: center; margin-bottom: 48px; }
        .capsule-title {
            font-family: var(--font-display); font-weight: 800;
            font-size: clamp(28px, 3.5vw, 42px); color: var(--color-text); margin-bottom: 8px;
        }
        .capsule-sub { font-size: 16px; color: var(--color-muted); }

        /* Textarea */
        .capsule-textarea {
            width: 100%; min-height: 200px; padding: 24px;
            font-family: var(--font-body); font-size: 16px; line-height: 1.7;
            color: var(--color-text); background: var(--color-surface);
            border: 2px dashed var(--color-primary); border-radius: var(--radius-card);
            outline: none; resize: vertical;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .capsule-textarea::placeholder { color: var(--color-muted); opacity: 0.5; }
        .capsule-textarea:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.08); }

        /* Date pills */
        .date-pills {
            display: flex; gap: 12px; justify-content: center; margin: 24px 0;
        }
        .date-pill {
            font-family: var(--font-body); font-size: 14px; font-weight: 700;
            padding: 10px 24px; border-radius: var(--radius-pill);
            border: 2px solid var(--color-border); background: var(--color-surface);
            color: var(--color-muted); cursor: pointer; transition: all 0.2s ease;
        }
        .date-pill:hover { border-color: var(--color-primary); color: var(--color-primary); }
        .date-pill.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }

        /* Seal button */
        .seal-btn {
            display: block; width: 100%; padding: 18px; margin-top: 8px;
            font-family: var(--font-body); font-size: 16px; font-weight: 700;
            color: #fff; background: var(--color-primary); border: none;
            border-radius: var(--radius-pill); cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .seal-btn:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(67, 97, 238, 0.3); }
        .seal-btn:active { transform: scale(0.97) !important; }

        /* Seal animation overlay */
        .seal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(20px);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .seal-overlay.active { display: flex; }

        .seal-blob {
            width: 120px; height: 120px;
            animation: sealBlob 2s ease-in-out forwards;
        }
        @keyframes sealBlob {
            0% { transform: scale(0.5) translateY(40px); opacity: 0; }
            50% { transform: scale(1.2) translateY(-10px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .seal-text {
            font-family: var(--font-display); font-weight: 800;
            font-size: 28px; color: var(--color-text); margin-top: 24px;
        }
        .seal-sub {
            font-size: 16px; color: var(--color-muted); margin-top: 8px;
        }

        /* Locked capsule card */
        .locked-card {
            background: var(--color-surface);
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-card);
            padding: 40px;
            text-align: center;
            margin-top: 32px;
            display: none;
        }
        .locked-card.visible { display: block; }
        .lock-icon { font-size: 40px; margin-bottom: 12px; }
        .locked-date {
            font-family: var(--font-mono); font-size: 14px; color: var(--color-primary);
            font-weight: 700; margin-bottom: 4px;
        }
        .locked-countdown {
            font-family: var(--font-mono); font-size: 24px; color: var(--color-text);
            font-weight: 700;
        }

        /* Capsules list */
        .capsules-list { margin-top: 48px; }
        .capsules-list-title {
            font-family: var(--font-display); font-weight: 700; font-size: 24px;
            color: var(--color-text); margin-bottom: 20px;
        }
        .capsule-item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            padding: 24px;
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 16px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .capsule-item:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); }
        .capsule-icon { font-size: 28px; flex-shrink: 0; }
        .capsule-info { flex: 1; }
        .capsule-preview {
            font-size: 14px; color: var(--color-text); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .capsule-meta {
            font-family: var(--font-mono); font-size: 11px; color: var(--color-muted); margin-top: 4px;
        }

        /* Read overlay */
        .read-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(253, 250, 245, 0.95);
            backdrop-filter: blur(20px);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 48px;
        }
        .read-overlay.active { display: flex; }
        .read-content {
            max-width: 560px; width: 100%;
            background: var(--color-surface);
            border-radius: var(--radius-card);
            padding: 40px;
            box-shadow: var(--shadow-card);
        }
        .read-label {
            font-family: var(--font-mono); font-size: 11px; color: var(--color-muted);
            letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px;
        }
        .read-text {
            font-size: 17px; line-height: 1.8; color: var(--color-text);
            white-space: pre-wrap;
        }
        .read-close {
            margin-top: 24px; font-family: var(--font-body); font-size: 14px; font-weight: 700;
            color: var(--color-primary); background: none; border: none; cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar { padding: 14px 24px; }
            .nav-links { display: none; }
            .nav-links a::after { display: none; }

            .nav-toggle {
                display: flex; flex-direction: column; gap: 5px;
                background: none; border: none; cursor: pointer; padding: 8px; z-index: 1001;
            }
            .nav-toggle span {
                display: block; width: 26px; height: 3px;
                background: var(--color-text); border-radius: 2px;
            }

            .mobile-menu {
                display: none; position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: #FFFFFF; z-index: 1000;
                flex-direction: column; padding-top: 70px; overflow-y: auto;
            }
            .mobile-menu.open { display: flex; }

            .mobile-menu-close {
                position: absolute; top: 18px; right: 24px;
                background: none; border: none; font-size: 28px;
                color: var(--color-text); cursor: pointer; padding: 8px; z-index: 1002; line-height: 1;
            }

            .mobile-menu a {
                display: block; font-family: var(--font-body); font-size: 1.2rem; font-weight: 700;
                color: var(--color-text); text-decoration: none;
                padding: 16px 24px; border-bottom: 1px solid var(--color-border); text-align: left;
            }
            .mobile-menu a:hover { background: var(--color-bg); }

            .capsule-page { padding: 100px 24px 60px; }
            .date-pills { flex-wrap: wrap; }
            .read-overlay { padding: 24px; }
            .read-content { padding: 28px; }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="/" class="navbar-brand">
            <svg class="blob-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 8 C72 3, 95 18, 92 44 C89 70, 74 94, 50 92 C26 90, 6 72, 8 48 C10 22, 28 13, 50 8Z" fill="#4361EE"/>
                <circle cx="36" cy="46" r="4.5" fill="#1A1A2E"/><circle cx="64" cy="46" r="4.5" fill="#1A1A2E"/>
                <circle cx="37.5" cy="44.5" r="1.5" fill="#fff"/><circle cx="65.5" cy="44.5" r="1.5" fill="#fff"/>
                <ellipse cx="26" cy="56" rx="6" ry="3.5" fill="#FF6B9D" opacity="0.35"/><ellipse cx="74" cy="56" rx="6" ry="3.5" fill="#FF6B9D" opacity="0.35"/>
                <path d="M36 62 Q50 74 64 62" stroke="#1A1A2E" stroke-width="3" fill="none" stroke-linecap="round"/>
            </svg>
            Blobbi
        </a>
        <div class="nav-links" id="navLinks">
            <a href="/">Journal</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="galaxy.html">Galaxy</a>
            <a href="capsule.html" class="active">Capsule</a>
        </div>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </nav>

    <!-- Mobile menu overlay -->
    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-menu-close" id="mobileMenuClose" aria-label="Close menu">✕</button>
        <a href="/">Journal</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="galaxy.html">Galaxy</a>
        <a href="capsule.html" class="active">Capsule</a>
    </div>

    <main class="capsule-page">
        <div class="capsule-header">
            <h1 class="capsule-title">write to your future self ✉</h1>
            <p class="capsule-sub">seal it today. open it in 30, 90, or 365 days.</p>
        </div>

        <textarea class="capsule-textarea" id="capsuleText" placeholder="dear future me,"></textarea>

        <div class="date-pills">
            <button class="date-pill active" data-days="30" onclick="selectDays(30, this)">30 days</button>
            <button class="date-pill" data-days="90" onclick="selectDays(90, this)">90 days</button>
            <button class="date-pill" data-days="365" onclick="selectDays(365, this)">365 days</button>
        </div>

        <button class="seal-btn" onclick="sealCapsule()">seal the capsule →</button>

        <!-- Locked card (shown after sealing) -->
        <div class="locked-card" id="lockedCard">
            <div class="lock-icon">🔒</div>
            <div class="locked-date" id="lockedDate"></div>
            <div class="locked-countdown" id="lockedCountdown"></div>
        </div>

        <!-- Capsules list -->
        <div class="capsules-list" id="capsulesList">
            <h3 class="capsules-list-title">Your capsules</h3>
            <div id="capsulesContainer"></div>
        </div>
    </main>

    <!-- Seal animation -->
    <div class="seal-overlay" id="sealOverlay">
        <svg class="seal-blob" viewBox="0 0 100 100">
            <path d="M50 8 C72 3, 95 18, 92 44 C89 70, 74 94, 50 92 C26 90, 6 72, 8 48 C10 22, 28 13, 50 8Z" fill="#4361EE"/>
            <circle cx="36" cy="46" r="4.5" fill="#1A1A2E"/><circle cx="64" cy="46" r="4.5" fill="#1A1A2E"/>
            <circle cx="37.5" cy="44.5" r="1.5" fill="#fff"/><circle cx="65.5" cy="44.5" r="1.5" fill="#fff"/>
            <path d="M36 62 Q50 74 64 62" stroke="#1A1A2E" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
        <div class="seal-text">sealed ✦</div>
        <div class="seal-sub">your future self will thank you</div>
    </div>

    <!-- Read overlay -->
    <div class="read-overlay" id="readOverlay">
        <div class="read-content">
            <div class="read-label" id="readLabel">opened capsule</div>
            <div class="read-text" id="readText"></div>
            <button class="read-close" onclick="closeRead()">← back</button>
        </div>
    </div>

    <script>
        // Navbar
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 30), { passive: true });
        const navToggle = document.getElementById('navToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        const mobileMenuClose = document.getElementById('mobileMenuClose');
        navToggle.addEventListener('click', () => mobileMenu.classList.add('open'));
        mobileMenuClose.addEventListener('click', () => mobileMenu.classList.remove('open'));
        mobileMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => mobileMenu.classList.remove('open')));

        let selectedDays = 30;

        function selectDays(days, el) {
            selectedDays = days;
            document.querySelectorAll('.date-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
        }

        function getCapsules() {
            try { return JSON.parse(localStorage.getItem('blobbi_capsules') || '[]'); }
            catch { return []; }
        }

        function saveCapsules(capsules) {
            localStorage.setItem('blobbi_capsules', JSON.stringify(capsules));
        }

        function sealCapsule() {
            const text = document.getElementById('capsuleText').value.trim();
            if (!text) return;

            const now = new Date();
            const unlockDate = new Date(now);
            unlockDate.setDate(unlockDate.getDate() + selectedDays);

            const capsule = {
                id: Date.now(),
                text,
                sealedDate: now.toISOString(),
                unlockDate: unlockDate.toISOString(),
                opened: false
            };

            const capsules = getCapsules();
            capsules.unshift(capsule);
            saveCapsules(capsules);

            // Show seal animation
            const overlay = document.getElementById('sealOverlay');
            overlay.classList.add('active');

            setTimeout(() => {
                overlay.classList.remove('active');
                document.getElementById('capsuleText').value = '';
                renderCapsules();
            }, 2500);
        }

        function renderCapsules() {
            const container = document.getElementById('capsulesContainer');
            const capsules = getCapsules();

            if (capsules.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:var(--color-muted);padding:32px 0;">No capsules yet. Write your first one above.</div>';
                return;
            }

            const now = new Date();

            container.innerHTML = capsules.map(c => {
                const unlock = new Date(c.unlockDate);
                const isUnlocked = now >= unlock;
                const daysLeft = Math.max(0, Math.ceil((unlock - now) / (1000 * 60 * 60 * 24)));

                return `
                    <div class="capsule-item" onclick="${isUnlocked ? `readCapsule(${c.id})` : ''}">
                        <div class="capsule-icon">${isUnlocked ? '📬' : '🔒'}</div>
                        <div class="capsule-info">
                            <div class="capsule-preview">${escapeHtml(c.text)}</div>
                            <div class="capsule-meta">
                                ${isUnlocked ? 'tap to read' : `opens in ${daysLeft} days`} · sealed ${new Date(c.sealedDate).toLocaleDateString()}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function readCapsule(id) {
            const capsules = getCapsules();
            const capsule = capsules.find(c => c.id === id);
            if (!capsule) return;

            capsule.opened = true;
            saveCapsules(capsules);

            document.getElementById('readLabel').textContent = `sealed ${new Date(capsule.sealedDate).toLocaleDateString()} · opened ${new Date().toLocaleDateString()}`;
            document.getElementById('readText').textContent = capsule.text;
            document.getElementById('readOverlay').classList.add('active');
        }

        function closeRead() {
            document.getElementById('readOverlay').classList.remove('active');
            renderCapsules();
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        renderCapsules();
    </script>
</body>
</html>
